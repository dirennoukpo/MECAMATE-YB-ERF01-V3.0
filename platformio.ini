; ============================================================================
; YB-ERF01 (Yahboom ROS Driver Board) — Keil MDK / ARMCC -> GCC port
;
; Target : STM32F103RC, Cortex-M3, 256K flash / 48K RAM, HSE 8 MHz -> 72 MHz.
; Flashing: mcuisp.exe (serial ISP bootloader) or `pio run -t upload`, which
; drives stm32flash over the same CH340 serial bridge. Both need the board in
; bootloader mode (BOOT0 high + reset).
;
; The original code is kept untouched in tmp/V3.5.1/ (reference, not compiled).
; The compiled tree is src/{CMSIS,FWlib,FreeRTOS,Source} plus src/port_gcc/,
; which holds the ONLY additions made by the port (GNU startup + newlib retarget).
; ============================================================================

[env:genericSTM32F103RC]
platform = ststm32
board = genericSTM32F103RC
framework = cmsis

; Serial ISP bootloader over the CH340 USB-serial bridge (stm32flash), same path
; as mcuisp. Without these two lines PlatformIO falls back to the board default
; (upload_protocol = stlink) and OpenOCD fails with "open failed".
; The .hex is still produced in .pio/build/genericSTM32F103RC/ for mcuisp.exe;
; stm32flash itself flashes the .bin.
upload_protocol = serial
upload_port = COM6

; --- PlatformIO's cmsis framework compiles its own system_stm32f1xx.c and its
; --- own startup. Both must be neutralised:
;      * its SystemInit() does NOT configure the clock (the MCU would stay at
;        8 MHz on HSI instead of 72 MHz) and would collide at link time with the
;        SystemInit() of src/CMSIS/system_stm32f10x.c;
;      * its startup wires SVC/PendSV/SysTick onto weak handlers, which would
;        freeze FreeRTOS at the first context switch.
; --- We therefore point at file names that do not exist: the builder's src_filter
; --- (cmsis.py) then matches nothing, and src/port_gcc/ + src/CMSIS/ of the
; --- project supply the startup and SystemInit instead.
board_build.cmsis.system_file = _disabled_use_project_system_stm32f10x.c
board_build.cmsis.startup_file = _disabled_use_project_startup.S

board_build.ldscript = ldscript.ld

extra_scripts = post:extra_script.py

; -Os comes from _bare.py (PlatformIO default): remove it.
build_unflags = -Os

build_flags =
    ; Macros from the <Define> field of rosmaster.uvprojx (the only ones).
    ; STM32F10X_HD and USE_STDPERIPH_DRIVER are deliberately NOT passed here:
    ; they are hard-coded in src/CMSIS/stm32f10x.h (lines 70 and 105).
    -D MEMS_20648
    -D MEMS_WEARABLE_DEVICE
    -D MEMS_SECONDARY_DEVICE
    -D MEMS_AUGMENTED_SENSORS

    ; Source/APP/app_pid.h:30 defines a type named `pid_t` (the PID controller
    ; struct). newlib ALSO declares a POSIX pid_t (process id) in sys/types.h,
    ; pulled in by stdio.h -> type conflict. MicroLIB did not declare pid_t.
    ; newlib guards its declaration behind _PID_T_DECLARED, so we suppress it.
    ; Safe here: nothing in the firmware uses the POSIX pid_t.
    -D _PID_T_DECLARED

    ; <IncludePath> from the .uvprojx (the dead paths .\Source\IMU, .\Source\DMP
    ; and .\Source\eMPL are omitted: they do not exist on disk).
    -I src/CMSIS
    -I src/FWlib/inc
    -I src/FWlib/src
    -I src/Source/BSP
    -I src/Source/APP
    -I src/Source/DEBUG
    -I src/FreeRTOS/inc
    -I src/Source/TOOL

    ; Source/MEMS is exposed with -iquote and NOT with -I, because of
    ; Source/MEMS/inttypes.h: it is an MSVC shim that opens with
    ; #error "Use this header only with Microsoft Visual C++ compilers!".
    ; Under -I it would intercept every #include <inttypes.h> (including those
    ; coming from newlib) and break the build. Under -iquote it is only visible
    ; to #include "..." forms, which is all the MEMS code needs.
    -iquotesrc/Source/MEMS

    ; Keil: Optim=2 (= level 1), oTime=0, OneElfS=1 (one section per function).
    -O2
    -ffunction-sections
    -fdata-sections

    ; The original code (protocol, MEMS/InvenSense) does type punning that GCC's
    ; -O2 TBAA would silently break. ARMCC was more permissive.
    -fno-strict-aliasing
